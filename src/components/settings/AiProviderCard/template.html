<div class="ai-provider-card" :class="{ active: isActive }">
  <div class="provider-header" @click="toggleExpanded">
    <div class="provider-info">
      <span class="provider-name">{{ provider.name }}</span>
      <span v-if="isActive" class="tag tag-positive">已激活</span>
      <span v-else-if="provider.enabled" class="tag tag-neutral">已启用</span>
      <span v-else class="tag tag-info">未启用</span>
    </div>
    <div class="provider-header-actions">
      <span class="provider-toggle" :class="{ expanded }">{{ expanded ? '⌄' : '›' }}</span>
      <label class="switch" @click.stop>
        <input type="checkbox" :checked="provider.enabled" @change="$emit('toggle-enabled', provider.id, $event.target.checked)" />
        <span class="slider"></span>
      </label>
    </div>
  </div>
  <div v-if="expanded" class="provider-body">
    <div class="form-group">
      <label>API 地址</label>
      <input class="input" :value="provider.apiUrl" placeholder="https://api.example.com/v1/chat/completions" @input="$emit('update', provider.id, { apiUrl: $event.target.value })" />
    </div>
    <div class="form-group">
      <label>API Key</label>
      <div class="key-input">
        <input class="input" :type="showKey ? 'text' : 'password'" :value="provider.apiKey" placeholder="sk-..." @input="$emit('update', provider.id, { apiKey: $event.target.value })" />
        <button type="button" class="btn-eye" @click="showKey = !showKey">{{ showKey ? '🙈' : '👁' }}</button>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group flex-1">
        <label>模型</label>
        <input class="input" :value="provider.model" placeholder="model-name" @input="$emit('update', provider.id, { model: $event.target.value })" />
      </div>
      <div class="form-group">
        <label>温度 ({{ provider.temperature }})</label>
        <input type="range" class="range-input" :value="provider.temperature" min="0" max="2" step="0.1" @input="$emit('update', provider.id, { temperature: parseFloat($event.target.value) })" />
      </div>
    </div>
    <div class="form-group">
      <label>代理</label>
      <select class="input select-input" :value="provider.proxyId || ''" @change="$emit('update', provider.id, { proxyId: $event.target.value })">
        <option value="">不使用代理</option>
        <option v-for="p in enabledProxies" :key="p.id" :value="p.id">{{ p.name }}</option>
      </select>
    </div>
    <div class="provider-actions">
      <button class="btn-primary" :disabled="testing" @click="$emit('test', provider)">
        {{ testing ? '测试中...' : '测试连接' }}
      </button>
      <button v-if="testingResult" class="btn-ghost" :class="{ 'text-success': testingResult === '连接成功', 'text-danger': testingResult !== '连接成功' }">
        {{ testingResult }}
      </button>
      <button v-if="!isActive && provider.enabled" class="btn-primary" @click="$emit('set-active', provider.id)">
        设为激活
      </button>
    </div>
  </div>
</div>
