<div class="page settings-page">
  <h1 class="page-title">设置</h1>

  <div v-if="!settingsStore.initialized">正在加载设置...</div>

  <template v-else>
  <div class="settings-tabs">
    <button class="settings-tab" :class="{ active: activeTab === 'ai' }" @click="activeTab = 'ai'">
      <BrainCircuit :size="15" class="tab-svg" />
      <span>AI 模型</span>
    </button>
    <button class="settings-tab" :class="{ active: activeTab === 'search' }" @click="activeTab = 'search'">
      <Search :size="15" class="tab-svg" />
      <span>搜索</span>
    </button>
    <button class="settings-tab" :class="{ active: activeTab === 'datasource' }" @click="activeTab = 'datasource'">
      <Database :size="15" class="tab-svg" />
      <span>数据源</span>
    </button>
    <button class="settings-tab" :class="{ active: activeTab === 'proxy' }" @click="activeTab = 'proxy'">
      <Shield :size="15" class="tab-svg" />
      <span>代理</span>
    </button>
    <button class="settings-tab" :class="{ active: activeTab === 'notify' }" @click="activeTab = 'notify'">
      <Bell :size="15" class="tab-svg" />
      <span>通知</span>
    </button>
    <button class="settings-tab" :class="{ active: activeTab === 'update' }" @click="activeTab = 'update'">
      <Download :size="15" class="tab-svg" />
      <span>版本更新</span>
    </button>
    <button class="settings-tab" :class="{ active: activeTab === 'appearance' }" @click="activeTab = 'appearance'">
      <Palette :size="15" class="tab-svg" />
      <span>外观</span>
    </button>
  </div>

  <div v-if="activeTab === 'ai'" class="tab-content">
    <div v-if="aiConfigWarning" class="settings-alert settings-alert-warning">
      <strong>实时 AI 评估未完成配置</strong>
      <span>{{ aiConfigWarning }}</span>
    </div>
    <div class="data-source-options">
      <div class="option-row">
        <span class="option-label">Agent 最大研究步数</span>
        <div class="step-control">
          <input
            class="input select-input"
            type="number"
            min="4"
            max="100"
            step="1"
            :value="settingsStore.settings.ai.diagnosis.maxSteps"
            @change="handleDiagnosisMaxSteps"
          />
          <span class="step-hint">上限 100 步</span>
        </div>
      </div>
      <div v-if="anyAiAutoRunEnabled" class="option-row">
        <span class="option-label">AI 自动评估间隔</span>
        <div class="step-control">
          <input
            class="input select-input"
            type="number"
            min="10"
            max="600"
            step="5"
            :value="settingsStore.settings.ai.autoRunInterval"
            @change="handleAiAutoRunInterval"
          />
          <span class="step-hint">10 - 600 秒</span>
        </div>
      </div>
      <div class="option-row">
        <span class="option-label">显示完整轨迹</span>
        <label class="switch">
          <input type="checkbox" :checked="settingsStore.settings.ai.diagnosis.traceVerbose" @change="handleDiagnosisToggle('traceVerbose', $event)" />
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <div class="option-list auto-run-list">
      <div class="option-row option-row-rich">
        <div class="option-copy">
          <span class="option-label">首页市场点评自动诊断</span>
        </div>
        <label class="switch">
          <input type="checkbox" :checked="settingsStore.settings.ai.autoRun.homeDigest" @change="handleAiAutoRunToggle('homeDigest', $event)" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="option-row option-row-rich">
        <div class="option-copy">
          <span class="option-label">行情中心自动解读</span>
        </div>
        <label class="switch">
          <input type="checkbox" :checked="settingsStore.settings.ai.autoRun.marketDigest" @change="handleAiAutoRunToggle('marketDigest', $event)" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="option-row option-row-rich">
        <div class="option-copy">
          <span class="option-label">技术分析自动解读</span>
        </div>
        <label class="switch">
          <input type="checkbox" :checked="settingsStore.settings.ai.autoRun.analysisDigest" @change="handleAiAutoRunToggle('analysisDigest', $event)" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="option-row option-row-rich">
        <div class="option-copy">
          <span class="option-label">个股详情自动诊股</span>
        </div>
        <label class="switch">
          <input type="checkbox" :checked="settingsStore.settings.ai.autoRun.stockDetailDiagnosis" @change="handleAiAutoRunToggle('stockDetailDiagnosis', $event)" />
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <div class="provider-list">
      <ai-provider-card
        v-for="provider in settingsStore.settings.ai.providers"
        :key="provider.id"
        :provider="provider"
        :is-active="settingsStore.settings.ai.activeProviderId === provider.id"
        :testing="testingId === provider.id"
        :testing-result="provider.id === testingId ? testingResult : ''"
        :proxies="allProxies"
        @update="handleUpdateProvider"
        @toggle-enabled="handleToggleEnabled"
        @set-active="handleSetActive"
        @test="handleTestConnection"
      />
    </div>
  </div>

  <div v-if="activeTab === 'search'" class="tab-content">
    <div v-if="aiConfigWarning" class="settings-alert settings-alert-warning">
      <strong>搜索引擎未就绪</strong>
      <span>请至少启用并配置一个搜索源，否则 AI 评估无法补充实时新闻、政策和国际消息面。</span>
    </div>
    <div class="provider-list">
      <div v-for="provider in settingsStore.settings.ai.diagnosis.searchProviders" :key="provider.id" class="ai-provider-card" :class="{ active: settingsStore.settings.ai.diagnosis.activeSearchProviderId === provider.id }">
        <div class="provider-header">
          <div class="provider-info">
            <span class="provider-name">{{ provider.name }}</span>
            <span v-if="settingsStore.settings.ai.diagnosis.activeSearchProviderId === provider.id" class="tag tag-info">优先搜索源</span>
            <span v-else-if="provider.enabled" class="tag tag-neutral">已启用</span>
          </div>
          <label class="switch">
            <input type="checkbox" :checked="provider.enabled" @change="handleUpdateSearchProvider(provider.id, { enabled: $event.target.checked })" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="provider-body" v-if="provider.enabled">
          <div class="section-desc provider-hint">{{ getSearchProviderHint(provider) }}</div>
          <div class="field-grid">
            <label>
              <span>搜索地址</span>
              <input class="input" :value="provider.apiUrl" :placeholder="getSearchProviderUrlPlaceholder(provider)" @change="handleUpdateSearchProvider(provider.id, { apiUrl: $event.target.value })" />
            </label>
            <label>
              <span>访问密钥</span>
              <input class="input" type="password" :value="provider.apiKey" :placeholder="getSearchProviderKeyPlaceholder(provider)" @change="handleUpdateSearchProvider(provider.id, { apiKey: $event.target.value })" />
            </label>
            <label>
              <span>代理</span>
              <select class="input select-input" :value="provider.proxyId || ''" @change="handleUpdateSearchProvider(provider.id, { proxyId: $event.target.value })">
                <option value="">不使用代理</option>
                <option v-for="p in allProxies.filter(pr => pr.enabled)" :key="p.id" :value="p.id">{{ p.name }}</option>
              </select>
            </label>
          </div>
          <div class="provider-actions">
            <button v-if="settingsStore.settings.ai.diagnosis.activeSearchProviderId !== provider.id" class="btn-primary" @click="handleSetActiveSearchProvider(provider.id)">设为优先源</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div v-if="activeTab === 'datasource'" class="tab-content">
    <div class="data-source-options">
      <div v-if="dataRealtimeEnabled" class="option-row">
        <span class="option-label">刷新间隔</span>
        <select class="input select-input" :value="settingsStore.settings.dataSource.refreshInterval" @change="handleRefreshInterval">
          <option :value="3">3 秒</option>
          <option :value="5">5 秒</option>
          <option :value="10">10 秒</option>
          <option :value="30">30 秒</option>
          <option :value="60">60 秒</option>
        </select>
      </div>
      <div class="option-row">
        <span class="option-label">实时推送</span>
        <label class="switch">
          <input type="checkbox" :checked="settingsStore.settings.dataSource.realTimeEnabled" @change="handleRealTimeToggle" />
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <data-source-table
      v-if="configurableDataSources.length"
      :sources="configurableDataSources"
      :proxies="allProxies"
      @toggle="handleToggleDataSource"
      @update="handleUpdateDataSource"
    />
    <p v-else class="section-desc">当前没有需要手动配置的外部数据源。</p>
  </div>

  <div v-if="activeTab === 'proxy'" class="tab-content">
    <div class="data-source-options">
      <div class="section-desc">配置代理服务器，用于访问境外数据源或大模型 API。每个数据源和大模型可单独选择使用的代理。</div>
      <div class="option-row">
        <span class="option-label">代理列表</span>
        <button class="btn-primary" @click="handleAddProxy">新增代理</button>
      </div>
    </div>
    <div v-if="allProxies.length" class="proxy-grid">
      <div v-for="proxy in allProxies" :key="proxy.id" class="proxy-card">
        <div class="proxy-card-head">
          <div class="proxy-title-row">
            <strong>{{ proxy.name || '未命名代理' }}</strong>
            <span class="tag" :class="proxy.enabled ? 'tag-positive' : 'tag-neutral'">
              {{ proxy.enabled ? '已启用' : '已禁用' }}
            </span>
          </div>
          <div class="proxy-actions">
            <label class="switch">
              <input type="checkbox" :checked="proxy.enabled" @change="handleProxyChange(proxy.id, 'enabled', $event.target.checked)" />
              <span class="slider"></span>
            </label>
            <button class="btn-ghost danger" @click="handleRemoveProxy(proxy.id)">删除</button>
          </div>
        </div>
        <div class="field-grid">
          <label>
            <span>名称</span>
            <input class="input" :value="proxy.name" placeholder="代理名称" @change="handleProxyChange(proxy.id, 'name', $event.target.value)" />
          </label>
          <label>
            <span>协议</span>
            <select class="input select-input" :value="proxy.protocol" @change="handleProxyChange(proxy.id, 'protocol', $event.target.value)">
              <option value="http">HTTP</option>
              <option value="socks5">SOCKS5</option>
            </select>
          </label>
          <label>
            <span>地址</span>
            <input class="input" :value="proxy.host" placeholder="127.0.0.1" @change="handleProxyChange(proxy.id, 'host', $event.target.value)" />
          </label>
          <label>
            <span>端口</span>
            <input class="input" type="number" :value="proxy.port" placeholder="7890" @change="handleProxyChange(proxy.id, 'port', parseInt($event.target.value) || 7890)" />
          </label>
          <label>
            <span>用户名 (可选)</span>
            <input class="input" :value="proxy.username" placeholder="留空则不认证" @change="handleProxyChange(proxy.id, 'username', $event.target.value)" />
          </label>
          <label>
            <span>密码 (可选)</span>
            <input class="input" type="password" :value="proxy.password" placeholder="留空则不认证" @change="handleProxyChange(proxy.id, 'password', $event.target.value)" />
          </label>
        </div>
      </div>
    </div>
    <div v-else class="section-desc">暂无代理配置，点击上方「新增代理」添加。</div>
  </div>

  <div v-if="activeTab === 'notify'" class="tab-content">
    <div class="option-list">
      <div class="option-row">
        <span class="option-label">桌面通知</span>
        <label class="switch">
          <input type="checkbox" :checked="settingsStore.settings.notifications.desktopEnabled" @change="settingsStore.updateNotifications('desktopEnabled', $event.target.checked)" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="notify-integration">
      <div class="channel-toolbar">
        <div class="channel-create-actions">
          <button class="btn-primary" @click="addChannel">新增通知</button>
        </div>
      </div>

      <div v-if="allChannels.length" class="channel-grid">
        <article
          v-for="channel in allChannels"
          :key="channel.id"
          class="channel-card"
        >
          <div class="channel-card-head">
            <div>
              <div class="channel-title-row">
                <strong>{{ channel.name }}</strong>
                <span class="tag tag-info">{{ channelTypeLabel(channel.channelType) }}</span>
                <span class="tag" :class="channelStatuses[channel.id]?.listening ? 'tag-positive' : channelStatuses[channel.id]?.loggedIn ? 'tag-neutral' : 'tag-down'">
                  {{ channelStatuses[channel.id]?.status || '未登录' }}
                </span>
              </div>
              <div class="section-desc channel-meta">
                {{ channelStatuses[channel.id]?.accountId ? `账号 ${channelStatuses[channel.id]?.accountId}` : '当前还没有扫码绑定账号' }}
              </div>
            </div>
            <div class="channel-actions">
              <button v-if="channel.channelType === 'wechat'" class="btn-ghost" @click="startChannelLogin(channel)">扫码登录</button>
              <button v-if="channel.channelType === 'wechat'" class="btn-ghost" @click="logoutChannel(channel.id)">退出</button>
              <button class="btn-ghost danger" @click="removeChannel(channel.id)">删除</button>
            </div>
          </div>

          <div class="field-grid">
            <label>
              <span>通道名称</span>
              <input class="input" :value="channel.name" @change="updateChannel(channel.id, 'name', $event.target.value)" />
            </label>
            <label v-if="channel.channelType === 'wechat'">
              <span>服务地址</span>
              <input class="input" :value="channel.baseUrl" placeholder="https://ilinkai.weixin.qq.com" @change="updateChannel(channel.id, 'baseUrl', $event.target.value)" />
            </label>
          </div>

          <div v-if="qrSessions[channel.id]?.qrcodeImg" class="qr-card">
            <img :src="qrSessions[channel.id].qrcodeImg" alt="扫码登录二维码" />
            <div>扫码状态：{{ qrSessions[channel.id].status }}</div>
          </div>

          <div v-if="channelStatuses[channel.id]?.error" class="channel-error">
            {{ channelStatuses[channel.id].error }}
          </div>
        </article>
      </div>
      <div v-else>还没有通知通道。</div>
    </div>
  </div>

  <div v-if="activeTab === 'update'" class="tab-content">
    <section class="update-panel">
      <div class="update-summary">
        <div class="update-version-card">
          <span class="update-label">当前版本</span>
          <strong>v{{ appUpdateStore.currentVersion }}</strong>
        </div>
        <div class="update-version-card">
          <span class="update-label">最新版本</span>
          <strong>{{ appUpdateStore.availableUpdate ? `v${appUpdateStore.availableUpdate.version}` : '--' }}</strong>
        </div>
        <div class="update-version-card">
          <span class="update-label">检查时间</span>
          <strong>{{ formatDateTime(appUpdateStore.lastCheckedAt) }}</strong>
        </div>
        <div class="update-version-card">
          <span class="update-label">更新状态</span>
          <strong class="update-status-text" :class="appUpdateStatusTone">{{ appUpdateStatusLabel }}</strong>
        </div>
      </div>

      <div class="option-row">
        <span class="option-label">启动时自动检查更新</span>
        <label class="switch">
          <input type="checkbox" :checked="settingsStore.settings.appUpdate.autoCheck" @change="handleAppUpdateAutoCheck" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="update-actions">
        <button class="btn-primary" :disabled="appUpdateStore.isBusy" @click="handleCheckAppUpdate">
          {{ appUpdateStore.status === 'checking' ? '检查中...' : '检查更新' }}
        </button>
        <button
          class="btn-ghost"
          :disabled="appUpdateStore.isBusy || !appUpdateStore.availableUpdate"
          @click="handleInstallAppUpdate"
        >
          {{ appUpdateStore.status === 'downloading' || appUpdateStore.status === 'installing' ? '安装中...' : '下载并安装' }}
        </button>
      </div>

      <div v-if="appUpdateStore.progress" class="update-progress">
        <div class="update-progress-top">
          <span>{{ appUpdateProgressLabel }}</span>
          <span>{{ appUpdateStore.progress.percent ?? '--' }}%</span>
        </div>
        <div class="update-progress-track">
          <div class="update-progress-fill" :style="{ width: `${appUpdateStore.progress.percent ?? 0}%` }"></div>
        </div>
      </div>

      <div v-if="appUpdateStore.availableUpdate?.publishedAt" class="endpoint-card">
        <span>发布时间</span>
        <code>{{ formatDateTime(appUpdateStore.availableUpdate.publishedAt) }}</code>
      </div>

      <div v-if="appUpdateStore.availableUpdate?.notes" class="update-notes">
        <div class="update-notes-title">版本说明</div>
        <pre>{{ appUpdateStore.availableUpdate.notes }}</pre>
      </div>

      <div v-if="appUpdateStore.errorMessage" class="channel-error">
        {{ appUpdateStore.errorMessage }}
      </div>
    </section>
  </div>

  <div v-if="activeTab === 'appearance'" class="tab-content">
    <div class="option-list">
      <div class="option-row">
        <span class="option-label">主题</span>
        <select class="input select-input" :value="settingsStore.settings.appearance.theme" @change="settingsStore.updateAppearance('theme', $event.target.value)">
          <option value="dark">深色</option>
          <option value="light">浅色</option>
        </select>
      </div>
      <div class="option-row">
        <span class="option-label">字体大小</span>
        <select class="input select-input" :value="settingsStore.settings.appearance.fontSize" @change="settingsStore.updateAppearance('fontSize', parseInt($event.target.value))">
          <option :value="12">12px</option>
          <option :value="13">13px</option>
          <option :value="14">14px</option>
          <option :value="15">15px</option>
          <option :value="16">16px</option>
        </select>
      </div>
    </div>
  </div>
  </template>
</div>
