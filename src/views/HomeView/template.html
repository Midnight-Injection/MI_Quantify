<div class="page home-page">
  <header class="top-bar" :class="marketMood">
    <div class="top-bar__intro">
      <div class="top-bar__heading">
        <div>
          <span class="top-bar__eyebrow">Workbench</span>
          <h1 class="top-bar__title">市场总览工作台</h1>
        </div>
        <div class="market-tabs">
          <button
            v-for="tab in marketTabs"
            :key="tab.value"
            class="market-tab"
            :class="{ active: currentMarket === tab.value }"
            @click="switchMarket(tab.value)"
          >{{ tab.label }}</button>
        </div>
      </div>
      <div class="live-badge" :class="{ active: heroRealtimeActive }">
        <span class="live-dot"></span>
        <span>{{ heroRealtimeActive ? '实时刷新' : '最近快照' }}</span>
      </div>
    </div>
    <div class="top-bar__stats">
      <article v-for="card in pulseCards" :key="card.label" class="stat-pill" :class="card.tone">
        <span class="stat-pill__label">{{ card.label }}</span>
        <strong class="stat-pill__value" :class="{ 'stat-pill__value--pulse': isTurnoverPulseCard(card) }">
          <template v-if="isTurnoverPulseCard(card)">
            <span>{{ formatTurnoverPulse(card.value).compact }}</span>
            <small v-if="formatTurnoverPulse(card.value).compressed">{{ formatTurnoverPulse(card.value).full }}</small>
          </template>
          <template v-else>{{ card.value }}</template>
        </strong>
        <span class="stat-pill__detail">{{ isTurnoverPulseCard(card) ? currentBreadthSourceLabel : card.detail }}</span>
      </article>
    </div>
  </header>

  <section class="index-strip">
    <div class="index-strip__scroll">
      <article
        v-for="index in visibleIndices"
        :key="index.code"
        class="index-pill"
        :class="index.changePercent >= 0 ? 'up' : 'down'"
      >
        <span class="index-pill__name">{{ index.name }}</span>
        <strong class="index-pill__price">{{ formatPrice(index.price) }}</strong>
        <span class="index-pill__change">{{ index.changePercent >= 0 ? '+' : '' }}{{ formatPercent(index.changePercent) }}%</span>
      </article>
    </div>
  </section>

  <nav class="pill-tabs">
    <div class="pill-tabs__list">
      <button
        v-for="tab in homeTabs"
        :key="tab.key"
        class="pill-tab"
        :class="{ active: activeTab === tab.key }"
        @click="activeTab = tab.key"
      >{{ tab.label }}</button>
    </div>
  </nav>

  <section v-if="isInitialLoading" class="home-loading-shell">
    <span class="spinner"></span>
    <span>正在构建首页工作台...</span>
  </section>

  <section v-else class="tab-body">
    <HomeOverviewTab
      v-show="activeTab === 'overview'"
      :loading="tabs.overview.loading"
      :data="tabs.overview.data"
      @navigate-stock="navigateToStock"
      @select-sector="selectSector"
    />
    <HomeFundflowTab
      v-show="activeTab === 'fundflow'"
      :loading="tabs.fundflow.loading"
      :data="tabs.fundflow.data"
      @navigate-stock="navigateToStock"
    />
    <HomeSectorTab
      v-show="activeTab === 'sector'"
      :loading="tabs.sector.loading"
      :data="tabs.sector.data"
      :selected-sector-code="selectedSectorCode"
      :members-loading="sectorMembersLoading"
      :members="sectorMembers"
      @select-sector="selectSector"
      @navigate-stock="navigateToStock"
    />
    <HomeStocksTab
      v-show="activeTab === 'stocks'"
      :loading="tabs.stocks.loading"
      :data="tabs.stocks.data"
      :selected-stock-code="selectedStockCode"
      :detail-loading="stockDetailLoading"
      :stock-detail="stockDetail"
      @select-stock="selectStock"
      @navigate-stock="navigateToStock"
    />
    <HomeNewsTab
      v-show="activeTab === 'news'"
      :loading="tabs.news.loading"
      :data="tabs.news.data"
    />
    <HomeAiTab
      v-show="activeTab === 'ai'"
      :digest="aiDigest"
      :digest-loading="aiDigestLoading"
      :digest-error="aiDigestError"
      :context="aiContext"
      :market-mood="marketMood"
      :can-request-digest="homeDigestAutoEnabled"
      @navigate-stock="navigateToStock"
      @request-digest="requestDigest(true)"
      @cancel-digest="cancelHomeAiDigest"
    />
  </section>
</div>
