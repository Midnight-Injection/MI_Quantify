<div class="page ask-page">
  <div class="page-shell ask-shell" :class="{ 'ask-shell--sidebar-collapsed': isSidebarCollapsed }">
    <aside class="chat-sidebar" :class="{ collapsed: isSidebarCollapsed }">
      <div class="sidebar-header">
        <span v-if="!isSidebarCollapsed" class="sidebar-title">会话列表</span>
        <button v-if="!isSidebarCollapsed" type="button" class="sidebar-btn" @click="startNewConversation" aria-label="新建会话">
          <Plus :size="14" />
        </button>
        <button
          type="button"
          class="sidebar-btn sidebar-btn--toggle"
          :aria-label="isSidebarCollapsed ? '展开会话列表' : '收起会话列表'"
          @click="toggleSidebar"
        >
          <ChevronRight v-if="isSidebarCollapsed" :size="14" />
          <ChevronLeft v-else :size="14" />
        </button>
      </div>

      <div v-if="!isSidebarCollapsed" class="sidebar-list">
        <button type="button" class="sidebar-item" :class="{ active: activeConversationId === null }" @click="switchConversation(null)">
          <div class="sidebar-item-main">
            <span class="sidebar-item-title">新会话</span>
            <span class="sidebar-item-time">当前</span>
          </div>
        </button>

        <div
          v-for="conversation in conversations"
          :key="conversation.id"
          class="sidebar-item"
          :class="{ active: activeConversationId === conversation.id }"
        >
          <button type="button" class="sidebar-item-main" @click="switchConversation(conversation.id)">
            <span class="sidebar-item-title">{{ conversation.title || '未命名会话' }}</span>
            <span class="sidebar-item-time">{{ formatConversationTime(conversation.updatedAt || conversation.createdAt) }}</span>
          </button>
          <button
            type="button"
            class="sidebar-item-delete"
            aria-label="删除会话"
            @click.stop="removeConversation(conversation.id)"
          >
            ×
          </button>
        </div>
      </div>

      <div v-if="!isSidebarCollapsed" class="sidebar-footer">
        <button type="button" class="sidebar-collapse-btn" @click="toggleSidebar" aria-label="收起会话列表">
          <ChevronLeft :size="14" />
          <span>收起会话列表</span>
        </button>
      </div>
    </aside>

    <section class="chat-shell">
      <div class="chat-topbar">
        <div class="chat-topbar-copy">
          <strong>AI问股</strong>
          <span>点击右侧 + 直接开启全新会话面板。</span>
        </div>
        <div class="chat-topbar-actions">
          <button
            v-if="isSidebarCollapsed"
            type="button"
            class="chat-topbar-action chat-topbar-action--sidebar"
            @click="toggleSidebar"
            aria-label="展开会话列表"
          >
            <ChevronRight :size="16" />
          </button>
          <button type="button" class="chat-topbar-action" @click="startNewConversation" aria-label="新建会话">
            <Plus :size="16" />
          </button>
        </div>
      </div>

      <div ref="chatListRef" class="chat-list" @scroll="handleChatScroll">
        <template v-for="message in messages" :key="message.id">
          <div v-if="message.role === 'user'" class="bubble-row user-row">
            <div class="bubble bubble-user">
              <pre class="bubble-text">{{ message.content }}</pre>
            </div>
            <div class="avatar avatar-user">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
          </div>

          <div v-else class="bubble-row assistant-row">
            <div class="avatar avatar-assistant">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="8" r="1.5"/></svg>
            </div>
            <div class="assistant-content">
            <div v-if="shouldShowAssistantLiveStack(message)" class="assistant-live-stack">
              <div class="bubble bubble-thinking">
                <div class="thinking-header" @click="toggleThinking(message.id)">
                  <span class="thinking-icon">思考</span>
                  <span class="thinking-title">思考轨迹</span>
                  <span class="thinking-count">{{ getThinkingSteps(message).length || 1 }}</span>
                  <span class="thinking-toggle" :class="{ open: isThinkingExpanded(message) }">⌄</span>
                </div>
                <div v-if="isThinkingExpanded(message)" class="thinking-body">
                  <pre class="thinking-merged-text">{{ getThinkingText(message) }}</pre>
                </div>
              </div>

              <div class="bubble bubble-tools">
                <div class="tools-header" @click="toggleTools(message.id)">
                  <span class="tools-icon">工具</span>
                  <span class="tools-title">工具调用</span>
                  <span class="tools-count">{{ getToolSteps(message).length }}</span>
                  <span class="tools-toggle" :class="{ open: isToolsExpanded(message) }">⌄</span>
                </div>
                <div v-if="isToolsExpanded(message)" class="tools-body">
                  <div v-if="!getToolSteps(message).length" class="tool-empty">等待开始调用工具...</div>
                  <div
                    v-for="step in getToolSteps(message)"
                    :key="step.id"
                    class="tool-item"
                    :class="[step.status, { open: isToolStepExpanded(message.id, step.id) }]"
                  >
                    <div class="tool-row" @click="toggleToolStep(message.id, step.id)">
                      <span class="step-dot" :class="step.status"></span>
                      <span class="tool-name">{{ step.tool || step.title }}</span>
                      <span class="tool-status" :class="step.status">{{ getToolStatusLabel(step) }}</span>
                      <span class="tool-time">{{ getStepDurationLabel(step) }}</span>
                      <span class="tool-item-toggle" :class="{ open: isToolStepExpanded(message.id, step.id) }">⌄</span>
                    </div>
                    <p class="tool-summary">{{ step.resultSummary || step.query || step.inputSummary || '等待工具返回...' }}</p>
                    <div v-if="isToolStepExpanded(message.id, step.id)" class="tool-io-grid">
                      <div class="tool-io-card">
                        <span class="tool-io-label">入参</span>
                        <pre class="tool-io-text">{{ getToolInputText(step) }}</pre>
                      </div>
                      <div class="tool-io-card">
                        <span class="tool-io-label">出参</span>
                        <pre class="tool-io-text">{{ getToolOutputText(step) }}</pre>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div v-if="!message.diagnosis && !message.recommendationResult && !message.investmentResult" class="bubble bubble-synthesis">
                <div class="synthesis-header">
                  <span class="synthesis-icon">总结</span>
                  <span class="synthesis-title">结论生成</span>
                  <span v-if="getMessageElapsedLabel(message)" class="synthesis-time">总耗时 {{ getMessageElapsedLabel(message) }}</span>
                  <span v-if="message.synthesisRunning || message.loading || message.streaming" class="synthesis-spinner"></span>
                </div>
                <pre class="synthesis-text synthesis-merged-text">{{ getResultText(message) }}</pre>
              </div>

            </div>

            <div v-if="message.recommendationResult" class="bubble bubble-recommendation">
              <div class="recommendation-topline">
                <div>
                  <h3>{{ message.recommendationResult.marketSummary }}</h3>
                </div>
              </div>

              <div class="basis-tags">
                <span v-for="item in message.recommendationResult.basisSummary" :key="item" class="basis-tag">{{ item }}</span>
              </div>

              <div class="candidate-list">
                <article v-for="candidate in message.recommendationResult.candidates" :key="candidate.code" class="candidate-card">
                  <div class="candidate-head">
                    <div>
                      <span class="candidate-rank">No.{{ candidate.rank }}</span>
                      <h4>{{ candidate.name }}</h4>
                      <p>{{ candidate.code }} · {{ getCandidateMarketLabel(candidate.code) }}</p>
                    </div>
                    <div class="candidate-score">{{ candidate.score }}</div>
                  </div>

                  <p class="candidate-summary">{{ candidate.summary }}</p>

                  <div class="candidate-metrics">
                    <div class="candidate-metric">
                      <span>预计启动</span>
                      <strong>{{ candidate.launchWindow.label }}</strong>
                      <small>{{ candidate.launchWindow.reason }}</small>
                    </div>
                    <div class="candidate-metric">
                      <span>观察 / 介入区间</span>
                      <strong>{{ formatRange(candidate.analysis.buyLower, candidate.analysis.buyUpper) }}</strong>
                      <small>{{ candidate.analysis.entryAdvice || candidate.shortlistReason }}</small>
                    </div>
                  </div>

                  <div class="candidate-section">
                    <span class="candidate-section-title">入选理由</span>
                    <div class="candidate-pills">
                      <span v-for="item in candidate.whySelected" :key="item" class="candidate-pill">{{ item }}</span>
                    </div>
                  </div>

                  <div class="candidate-section">
                    <span class="candidate-section-title">主要风险</span>
                    <div class="candidate-pills warning">
                      <span v-for="item in candidate.analysis.risks.slice(0, 3)" :key="item" class="candidate-pill">{{ item }}</span>
                    </div>
                  </div>

                  <div class="candidate-section">
                    <span class="candidate-section-title">证据摘要</span>
                    <p class="candidate-evidence">{{ candidate.evidence.slice(0, 2).map(item => item.summary).join('；') || '当前更多基于实时行情、K线与消息面综合判断。' }}</p>
                  </div>
                </article>
              </div>

              <pre class="bubble-text result-text">{{ message.content }}</pre>
            </div>

            <div v-if="message.investmentResult" class="bubble bubble-recommendation">
              <div class="recommendation-topline">
                <div>
                  <h3>{{ message.investmentResult.marketSummary }}</h3>
                </div>
              </div>

              <div class="basis-tags">
                <span v-for="item in message.investmentResult.basisSummary" :key="item" class="basis-tag">{{ item }}</span>
              </div>

              <div class="candidate-list">
                <article v-for="candidate in message.investmentResult.candidates" :key="candidate.productCode" class="candidate-card">
                  <div class="candidate-head">
                    <div>
                      <span class="candidate-rank">No.{{ candidate.rank }}</span>
                      <h4>{{ candidate.productName }}</h4>
                      <p>{{ candidate.productCode }} · {{ candidate.category === 'deposit' ? '存款' : candidate.category === 'fund' ? '基金' : '理财' }}</p>
                    </div>
                    <div class="candidate-score">{{ candidate.suitabilityScore }}</div>
                  </div>

                  <p class="candidate-summary">{{ candidate.reason }}</p>

                  <div class="candidate-metrics">
                    <div class="candidate-metric">
                      <span>收益测算</span>
                      <strong>{{ formatPrice(candidate.estimatedProfitMin) }} - {{ formatPrice(candidate.estimatedProfitMax) }}</strong>
                      <small>中性参考 {{ formatPrice(candidate.estimatedProfitMid) }}</small>
                    </div>
                    <div class="candidate-metric">
                      <span>风险等级</span>
                      <strong>{{ candidate.riskLevel }}</strong>
                      <small>{{ candidate.benchmarkText || (candidate.annualRate ? `挂牌利率 ${candidate.annualRate}%` : '以历史收益或基准做参考') }}</small>
                    </div>
                  </div>

                  <div class="candidate-section">
                    <span class="candidate-section-title">主要依据</span>
                    <div class="candidate-pills">
                      <span v-for="item in candidate.highlights" :key="item" class="candidate-pill">{{ item }}</span>
                    </div>
                  </div>

                  <div class="candidate-section">
                    <span class="candidate-section-title">主要风险</span>
                    <div class="candidate-pills warning">
                      <span v-for="item in candidate.risks" :key="item" class="candidate-pill">{{ item }}</span>
                    </div>
                  </div>
                </article>
              </div>

              <pre class="bubble-text result-text">{{ message.content }}</pre>
            </div>

            <div v-if="message.diagnosis" class="bubble bubble-result">
              <div class="result-meta">
                <span class="result-stock">{{ message.stockName || message.diagnosis?.stockInfo?.name }} · {{ message.code || message.diagnosis?.stockInfo?.code }}</span>
                <span v-if="message.diagnosis?.selectedStrategy" class="result-strategy">{{ message.diagnosis.selectedStrategy.name }}</span>
              </div>

              <div class="insight-grid">
                <div class="insight-card primary">
                  <span class="insight-label">结论</span>
                  <strong class="insight-value">{{ message.diagnosis.diagnosis.recommendation }}</strong>
                  <p class="insight-desc">{{ message.diagnosis.diagnosis.prediction }}</p>
                </div>
                <div class="insight-card">
                  <span class="insight-label">买入区间</span>
                  <strong class="insight-value">{{ formatRange(message.diagnosis.diagnosis.buyLower, message.diagnosis.diagnosis.buyUpper) }}</strong>
                  <p class="insight-desc">{{ message.diagnosis.diagnosis.entryAdvice || '等回踩确认后分批介入。' }}</p>
                </div>
                <div class="insight-card">
                  <span class="insight-label">卖出区间</span>
                  <strong class="insight-value">{{ formatRange(message.diagnosis.diagnosis.sellLower, message.diagnosis.diagnosis.sellUpper) }}</strong>
                  <p class="insight-desc">{{ message.diagnosis.diagnosis.exitAdvice || '到达目标区间后分批兑现。' }}</p>
                </div>
                <div class="insight-card">
                  <span class="insight-label">仓位建议</span>
                  <strong class="insight-value">{{ message.diagnosis.diagnosis.positionSize || '--' }} / {{ formatShares(message.diagnosis.diagnosis.suggestedShares) }}</strong>
                  <p class="insight-desc">{{ message.diagnosis.diagnosis.positionAdvice || '仓位应服从止损与账户风险。' }}</p>
                </div>
              </div>

              <pre class="bubble-text result-text">{{ message.content }}</pre>
            </div>

            <div v-if="message.loading && !message.streamSteps?.length && !message.content" class="bubble bubble-loading">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>

            <div
              v-else-if="shouldShowPlainAssistantBubble(message)"
              class="bubble bubble-plain"
            >
              <pre class="bubble-text">{{ message.content }}</pre>
            </div>

            <button
              v-if="isMessageTaskRunning(message)"
              type="button"
              class="bubble-stop-btn"
              @click="stopCurrentAskTask"
            >
              立即停止
            </button>

            <div v-if="message.quickReplies?.length && !message.loading" class="quick-replies">
              <button
                v-for="option in message.quickReplies"
                :key="option"
                type="button"
                class="quick-reply-chip"
                @click="sendQuickReply(option)"
              >
                {{ option }}
              </button>
            </div>
            </div>
          </div>
        </template>
      </div>

      <div class="composer-shell">
        <div class="composer-select-row">
          <div class="composer-toggle-group">
            <div class="mode-switch">
              <button
                type="button"
                class="mode-button"
                :class="{ active: activeMode === 'recommendation' }"
                :disabled="isConversationModeLocked && activeMode !== 'recommendation'"
                @click="setMode('recommendation')"
              >
                <span :class="{ disabled: isConversationModeLocked && activeMode !== 'recommendation' }">AI荐股</span>
              </button>
              <button
                type="button"
                class="mode-button"
                :class="{ active: activeMode === 'diagnosis' }"
                :disabled="isConversationModeLocked && activeMode !== 'diagnosis'"
                @click="setMode('diagnosis')"
              >
                <span :class="{ disabled: isConversationModeLocked && activeMode !== 'diagnosis' }">AI问股</span>
              </button>
              <button
                type="button"
                class="mode-button"
                :class="{ active: activeMode === 'investment' }"
                :disabled="isConversationModeLocked && activeMode !== 'investment'"
                @click="setMode('investment')"
              >
                <span :class="{ disabled: isConversationModeLocked && activeMode !== 'investment' }">AI投资</span>
              </button>
            </div>
          </div>
          <div v-if="showStrategyPicker" ref="strategyPickerRef" class="composer-select strategy-picker">
            <button class="strategy-trigger" type="button" @click="strategyMenuOpen = !strategyMenuOpen">
              <div class="strategy-trigger-copy">
                <strong>{{ selectedStrategy?.name || 'AI综合评估策略' }}</strong>
              </div>
              <ChevronDown :size="16" class="strategy-trigger-icon" :class="{ open: strategyMenuOpen }" />
            </button>
            <div v-if="strategyMenuOpen" class="strategy-menu">
              <button
                v-for="item in strategyOptions"
                :key="item.id"
                class="strategy-option"
                type="button"
                :class="{ active: selectedStrategyId === item.id }"
                @click="selectStrategy(item.id)"
              >
                <div class="strategy-option-copy">
                  <strong>{{ item.name }}</strong>
                  <p>{{ item.notes || item.description }}</p>
                </div>
              </button>
            </div>
          </div>
        </div>

        <div class="composer-input-row">
          <textarea
            v-model="input"
            class="input chat-input"
            :placeholder="inputPlaceholder"
            @keydown.enter.exact.prevent="sendMessage"
          ></textarea>
        </div>
      </div>
    </section>
  </div>
</div>
