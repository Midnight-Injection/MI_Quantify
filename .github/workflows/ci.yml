name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: warm pnpm store
        run: pnpm fetch --frozen-lockfile

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: type check
        run: pnpm typecheck

      - name: build web assets
        run: pnpm build

  build-test:
    needs: frontend-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-15-intel
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install dependencies (macos only)
        if: startsWith(matrix.platform, 'macos')
        run: |
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: build python sidecar
        shell: bash
        run: |
          python -m pip install --upgrade pip pyinstaller
          pip install -e ./src-python
          cd src-python
          pyinstaller mi-quantify-sidecar.spec --clean --noconfirm
          cd ..
          mkdir -p src-tauri/binaries
          TARGET="${{ matrix.rust_target }}"
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            cp src-python/dist/mi-quantify-sidecar.exe "src-tauri/binaries/mi-quantify-sidecar-${TARGET}.exe"
          else
            cp src-python/dist/mi-quantify-sidecar "src-tauri/binaries/mi-quantify-sidecar-${TARGET}"
            chmod +x "src-tauri/binaries/mi-quantify-sidecar-${TARGET}"
          fi

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: warm pnpm store
        run: pnpm fetch --frozen-lockfile

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: build the desktop app
        shell: bash
        run: pnpm tauri build --config src-tauri/tauri.ci.conf.json ${{ matrix.args }}
