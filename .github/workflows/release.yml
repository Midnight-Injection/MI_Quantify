name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - v*

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-15-intel
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    concurrency:
      group: publish-${{ github.ref }}-${{ matrix.platform }}-${{ matrix.args }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: install dependencies (macos only)
        if: startsWith(matrix.platform, 'macos')
        run: |
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: build python sidecar
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Python info ==="
          python --version
          python -c "import platform; print(f'arch={platform.machine()} os={platform.system()}')"
          
          echo "=== Installing dependencies ==="
          python -m pip install --upgrade pip pyinstaller
          pip install -e ./src-python
          
          echo "=== Building sidecar ==="
          cd src-python
          pyinstaller mi-quantify-sidecar.spec --clean --noconfirm
          cd ..
          
          echo "=== Copying binary ==="
          mkdir -p src-tauri/binaries
          TARGET="${{ matrix.rust_target }}"
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            BINARY="src-python/dist/mi-quantify-sidecar.exe"
            DEST="src-tauri/binaries/mi-quantify-sidecar-${TARGET}.exe"
          else
            BINARY="src-python/dist/mi-quantify-sidecar"
            DEST="src-tauri/binaries/mi-quantify-sidecar-${TARGET}"
          fi
          
          if [ ! -f "$BINARY" ]; then
            echo "ERROR: sidecar binary not found at $BINARY"
            ls -la src-python/dist/ || true
            exit 1
          fi
          
          cp "$BINARY" "$DEST"
          chmod +x "$DEST"
          
          echo "=== Verify ==="
          ls -la "$DEST"
          file "$DEST" || true
          echo "Sidecar binary ready: $DEST"

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: warm pnpm store
        run: pnpm fetch --frozen-lockfile

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: validate updater signing secret
        shell: bash
        run: |
          secret='${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}'
          secret="$(printf '%s' "$secret" | tr -d '\r\n\t ')"

          if [ -z "$secret" ]; then
            echo "::error::Missing repository secret TAURI_SIGNING_PRIVATE_KEY"
            echo "::error::Paste the full content of .local/signing/mi-quantify-updater.key into the repository secret"
            exit 1
          fi

          if [[ "$secret" != dW50cnVzdGVkIGNvbW1lbnQ6* ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY does not look like a Tauri updater private key file content"
            echo "::error::Paste the full base64 private key content, not the local file path or the public key"
            exit 1
          fi

          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            echo "$secret"
            echo "EOF"
          } >> "$GITHUB_ENV"

          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
            {
              echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF"
              echo '${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}'
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MI Quantify ${{ github.ref_name }}
          releaseBody: |
            ## MI Quantify ${{ github.ref_name }}

            ### Downloads
            - macOS: use the `.dmg` installer. Choose `aarch64` for Apple Silicon and `x64` for Intel.
            - Windows: use the `-setup.exe` installer.
            - Linux: use `.deb` for Ubuntu / Debian, or `.AppImage` for portable distribution.

            ### Notes
            - This release also publishes `latest.json` for the in-app updater.
            - Auto update becomes available after this release is published.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
